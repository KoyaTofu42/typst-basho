name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          previous_tag=$(git tag --sort=-creatordate | head -n 2 | tail -n 1)
          if [ -z "$previous_tag" ]; then
            echo "**Initial release**" > release_notes.md
            git log --oneline --format="* %s" >> release_notes.md
          else
            git log "$previous_tag"..HEAD --oneline --format="* %s" > release_notes.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
